version: "3.8"

# On-Prem Concurrent LLM - Ollama serving layer
#
# Usage:
#   docker compose up -d
#   docker exec -it ollama ollama pull qwen3:14b
#   docker exec -it ollama ollama pull deepseek-r1:32b   # optional, reasoning tier
#   docker exec -it ollama ollama pull gemma3:4b         # optional, utility tier
#
# Open WebUI (demo chat UI for Niren, Phase 4): http://<VM-IP>:3000
# First person to sign up becomes admin. Response info (click the info icon
# on any reply) shows prompt tokens, response tokens, and tokens/sec straight
# from Ollama's generation stats - no extra config needed for that.
#
# Guardrails (Phase 3, AI Guardrail Policy v1.0):
#   UAT  - http://<VM-IP>:8001/v1  (reasoning trace visible, used by Open WebUI above)
#   Prod - http://<VM-IP>:8000/v1  (reasoning trace stripped - for NL-Proposal-Builder/agents, Phase 5/6)
#   docker compose build guardrails-uat guardrails-prod   # first time / after config change
#
# Requires: nvidia-container-toolkit already installed and configured
# (see infra/02-setup-gpu-docker.sh) and Docker Compose v2 (the
# docker-compose-plugin package, not the standalone v1 docker-compose binary -
# v1 does not support the `deploy.resources.reservations.devices` GPU syntax).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    environment:
      # Niren's spec: max initial concurrency 1. Raise this once real usage
      # patterns justify it - see RUNBOOK.md Phase 7 backlog.
      - OLLAMA_NUM_PARALLEL=1
      # Raised 1 -> 2 (21 Jul 2026, Phase 3 follow-up): the A30's 24GB VRAM
      # can't hold all THREE model tiers resident at once (14B Q4 ~8-9GB +
      # 32B Q4 ~18-20GB alone exceeds it), but it CAN hold any one main tier
      # alongside gemma3:4b (~3.3GB), which every guardrailed request also
      # calls for self_check_input/output. At 1, every guardrailed request
      # forced 2-3 sequential cold model swaps (self-check -> main ->
      # self-check again) - confirmed slow in testing. At 2, gemma3:4b stays
      # resident and only the main tier swaps.
      - OLLAMA_MAX_LOADED_MODELS=2
      # Default keep-alive is 5m. The FIRST inference after a model loads is
      # always slow (CUDA JIT/warmup - see RUNBOOK.md benchmark notes), so a
      # short keep-alive means intermittent traffic (proposal generation,
      # occasional agent calls) keeps re-paying that cost. 30m is a starting
      # point, not a tuned value - revisit once real traffic patterns are known.
      - OLLAMA_KEEP_ALIVE=30m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Phase 3 - AI Guardrail Policy v1.0. Two environments sharing the one
  # Ollama/A30 backend (policy Section 8.1) - config differs only in whether
  # deepseek/qwen's <think> reasoning trace is stripped. See guardrails/
  # config_uat/config.yml and config_prod/config.yml.
  guardrails-uat:
    build:
      context: ./guardrails
      dockerfile: Dockerfile
    container_name: guardrails-uat
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./guardrails/config_uat/default:/config/default:ro
    environment:
      # nemoguardrails resolves the ollama base_url via these env vars at
      # runtime (config.yml's parameters.base_url alone was not enough -
      # server errored "MAIN_MODEL_BASE_URL is not set" on first boot).
      # Named per model "type" in config.yml, uppercased + _BASE_URL.
      # Must be Ollama's OpenAI-compatible path (/v1) - bare root 404s.
      - MAIN_MODEL_BASE_URL=http://ollama:11434/v1
      - SELF_CHECK_INPUT_MODEL_BASE_URL=http://ollama:11434/v1
      - SELF_CHECK_OUTPUT_MODEL_BASE_URL=http://ollama:11434/v1
      # Phase 3 follow-up (21-Jul-2026) - audit logging, Layer 1 (see
      # RUNBOOK.md). opentelemetry-instrument (Dockerfile CMD) reads these to
      # auto-export Python's stdlib logging output via OTLP straight to
      # Loki's native OTLP log-ingestion endpoint - no separate Collector
      # container. Traces/metrics explicitly disabled: distributed tracing
      # was deliberately deferred (separate, bigger capability - see policy
      # discussion), no point spending resources exporting signals we don't
      # use yet.
      - OTEL_SERVICE_NAME=guardrails-uat
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=uat
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED=true
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://loki:3100/otlp/v1/logs
      - OTEL_EXPORTER_OTLP_LOGS_PROTOCOL=http/protobuf
      # Layer 2 audit logging (Policy v1.1 Section 10.1) - label only, used
      # by config_uat/default/actions.py for the "model" field on each audit
      # log line. Must match this config's `type: main` model above. Does
      # NOT affect model routing/resolution - purely a log label.
      - GUARDRAILS_MAIN_MODEL=qwen3:14b
    depends_on:
      - ollama
      - loki

  guardrails-prod:
    build:
      context: ./guardrails
      dockerfile: Dockerfile
    container_name: guardrails-prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./guardrails/config_prod/default:/config/default:ro
    environment:
      - MAIN_MODEL_BASE_URL=http://ollama:11434/v1
      - SELF_CHECK_INPUT_MODEL_BASE_URL=http://ollama:11434/v1
      - SELF_CHECK_OUTPUT_MODEL_BASE_URL=http://ollama:11434/v1
      - OTEL_SERVICE_NAME=guardrails-prod
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=prod
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_TRACES_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED=true
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://loki:3100/otlp/v1/logs
      - OTEL_EXPORTER_OTLP_LOGS_PROTOCOL=http/protobuf
    depends_on:
      - ollama
      - loki

  # Phase 4 demo UI for Niren, now repointed through guardrails-uat instead of
  # straight at Ollama (Phase 3 is live - guardrails are mandatory per policy
  # Section 3, not optional per-app). Reasoning trace stays visible here
  # because it's the UAT config - see policy Section 8.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      # No longer talking to Ollama directly - OPENAI_API_BASE_URL points at
      # guardrails-uat's OpenAI-compatible endpoint instead, so every demo
      # request goes through the self-check input/output rails.
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URLS=http://guardrails-uat:8000/v1
      - OPENAI_API_KEYS=not-checked-internal-only
      # Kept as a fallback connection for direct troubleshooting only - not
      # meant to be selected for normal demo use now that guardrails are live.
      - OLLAMA_BASE_URL=http://ollama:11434
      # Turns off telemetry/update pings to an external server - internal
      # deployment, no need for it to phone home.
      - WEBUI_AUTH=true
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
      - guardrails-uat

  # Phase 3 follow-up (21-Jul-2026) - AI Guardrail Policy v1.1 Section 10
  # audit-log layer. Stores guardrail decision logs shipped from both
  # guardrails-uat and guardrails-prod via OpenTelemetry (see their OTEL_*
  # env vars above). 180-day retention configured in loki-config.yaml.
  #
  # Resource limits are deliberate and important, not boilerplate: this VM's
  # CPU/RAM/VRAM budget is shared with the GPU-serving containers that 3-4
  # daily NL-Proposal-Builder users depend on, and this platform's roadmap
  # (AI Accounting, AI HR, more agents) only adds more consumers over time.
  # Loki/Grafana never touch the GPU and are low-volume for this scale, but
  # capping them explicitly means a logging bug can never degrade the actual
  # user-facing service. Revisit these caps only if Niren scales the
  # underlying hardware or log volume genuinely grows past this budget.
  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  grafana:
    image: grafana/grafana-oss:11.4.0
    container_name: grafana
    restart: unless-stopped
    ports:
      # Host 3001, not 3000 - open-webui already owns host port 3000.
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      # Admin = Raghu per AI Guardrail Policy v1.1 Section 10.4. This
      # bootstrap password was changed via the Grafana UI on first login
      # (22-Jul-2026) - the value below is now stale/inert, only used if
      # the grafana-data volume is ever wiped and Grafana re-bootstraps
      # from scratch (in which case, set a new real password again on next
      # first login - don't rely on this value being current).
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=ChangeMe_OnFirstLogin!
      # Niren's Manager access (policy v1.1) maps to Grafana's built-in
      # Editor role. Account created 22-Jul-2026 via Server Admin > Users >
      # New user (role: Editor) - not managed via env vars/this file.
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  # external: true - pins this to the literal volume named "ollama" rather
  # than letting Compose create a project-prefixed one (e.g. serving_ollama).
  # Needed because the ollama container/volume predates this compose project
  # (started standalone originally) - without this, `docker rm -f ollama` +
  # `compose up` silently attaches to a NEW empty volume instead of the one
  # holding the actual pulled models (bit us 21 Jul 2026 during the
  # MAX_LOADED_MODELS fix - models list came back empty after recreation).
  ollama:
    external: true
  open-webui:
  loki-data:
  grafana-data:
