# Prod environment - AI Guardrail Policy v1.0, Section 8.
# reasoning_config strips the model's <think>...</think> reasoning trace before
# the response reaches the client - the only functional difference from
# config_uat. DeepSeek and Nemotron-family models both use <think>/</think> as
# their reasoning delimiters, which is what qwen3/deepseek-r1 produce.
#
# Same shared Ollama backend as UAT (single A30 - see policy Section 8.1).
#
# rails.input/output.flows reference "... with audit" flows (audit_flows.co)
# instead of the library's built-in "self check input"/"self check output" -
# Layer 2 structured audit logging (AI Guardrail Policy v1.1 Section 10.1),
# promoted from UAT 22-Jul-2026 after full verification there: input
# block/allow AND output block/allow all confirmed correct via live tests
# and Loki queries (RUNBOOK.md Section 6.6) - not promoted on assumption.
# actions.py and audit_flows.co are byte-identical to config_uat/default's -
# only the environment differs, read at runtime from OTEL_RESOURCE_ATTRIBUTES
# (docker-compose.yml), not from anything in this config directory.

models:
  - type: main
    engine: ollama
    model: qwen3:14b
    parameters:
      base_url: http://ollama:11434/v1
    reasoning_config:
      remove_reasoning_traces: True
      start_token: "<think>"
      end_token: "</think>"

  - type: self_check_input
    engine: ollama
    model: gemma3:4b
    parameters:
      base_url: http://ollama:11434/v1

  - type: self_check_output
    engine: ollama
    model: gemma3:4b
    parameters:
      base_url: http://ollama:11434/v1

rails:
  input:
    flows:
      - self check input with audit
  output:
    flows:
      - self check output with audit
