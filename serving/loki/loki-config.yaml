# Loki config - AI Guardrail Policy v1.1 Section 10 (180-day retention).
#
# Single-binary, filesystem storage - appropriate for this VM's scale (one
# guardrails audit stream, 3-4 daily users initially per the platform's
# "digital employees" roadmap - see project memory). Not a multi-tenant or
# clustered setup; revisit if/when Niren scales the underlying hardware.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  # Keep Loki's own logging light - this box's resources are shared with the
  # GPU-serving containers, don't spend cycles on verbose internal logging.
  log_level: warn

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Native OTLP log ingestion (Loki 3.0+) - lets the guardrails containers ship
# logs directly to http://loki:3100/otlp/v1/logs with no separate OpenTelemetry
# Collector container needed. Structured Metadata (how OTLP attributes are
# stored) is on by default in 3.0+; listed explicitly here for clarity.
limits_config:
  allow_structured_metadata: true
  retention_period: 4320h # 180 days, per policy v1.1 Section 10.2
  # Conservative ingestion caps - this is a low-volume internal audit stream
  # (guardrail decisions for a handful of daily users), not a general-purpose
  # log aggregator. Keeps Loki from ever trying to consume more than its
  # resource limits in docker-compose.yml allow for.
  ingestion_rate_mb: 4
  ingestion_burst_size_mb: 8

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
